<title>HVAC Asset Lookup — NZ Steel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:  #1F4E79; --mid: #2E75B6; --light: #BDD7EE;
    --svc:   #DEEBF7; --flt: #FCE4D6;
    --svc-dk:#1F4E79; --flt-dk:#833C00;
    --green: #E2EFDA; --green-dk:#375623;
    --red:   #C00000; --bg: #F0F4F8; --card: #FFFFFF;
    --border:#D0D8E4; --text:#1A1A2E; --muted:#6B7280;
  }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  header { background:var(--navy); padding:18px 32px; display:flex; align-items:center; gap:16px; box-shadow:0 2px 8px rgba(0,0,0,0.2); }
  header .logo { width:40px;height:40px;background:var(--mid);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;color:white;font-size:18px;letter-spacing:-1px; }
  header h1 { color:white;font-size:20px;font-weight:600; }
  header span { color:var(--light);font-size:13px;margin-left:auto; }

  .search-zone { background:var(--navy); padding:0 32px 28px; position:sticky; top:0; z-index:50; }
  .search-box { max-width:580px; position:relative; display:flex; gap:8px; align-items:center; z-index:60; }
  .search-box input { flex:1;padding:14px 20px 14px 48px;font-size:16px;border:2px solid var(--mid);border-radius:10px;background:rgba(255,255,255,0.1);color:white;outline:none;transition:all 0.2s;font-weight:500; }
  .search-box input::placeholder { color:rgba(255,255,255,0.45);font-weight:400; }
  .search-box input:focus { background:rgba(255,255,255,0.18);border-color:var(--light); }
  .search-icon { position:absolute;left:16px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.5);font-size:18px; }
  .search-hint { color:rgba(255,255,255,0.5);font-size:12px;margin-top:8px;padding-left:2px; }

  .suggestions { position:absolute;top:calc(100% + 4px);left:0;right:0;background:white;border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,0.15);max-height:420px;overflow-y:auto;z-index:100; }
  .suggestion-item { padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border); }
  .suggestion-item:last-child { border-bottom:none; }
  .suggestion-item:hover { background:#F0F6FF; }
  .sug-header { display:flex;align-items:center;gap:8px;margin-bottom:6px; }
  .sug-cba { font-size:15px;font-weight:800;color:var(--navy); }
  .sug-match-badge { font-size:10px;font-weight:700;text-transform:uppercase;color:white;background:var(--mid);border-radius:10px;padding:2px 7px;flex-shrink:0; }
  .sug-site { font-size:11px;color:var(--muted);margin-left:auto; }
  .sug-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:4px 12px; }
  .sug-field { display:flex;flex-direction:column; }
  .sug-label { font-size:9px;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);font-weight:600; }
  .sug-value { font-size:12px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
  .sug-value.mono { font-family:monospace;font-size:11px;color:var(--mid); }

  main { padding:28px 32px;max-width:1100px; }
  .empty-state { text-align:center;padding:80px 20px;color:var(--muted); }
  .empty-state .icon { font-size:48px;margin-bottom:16px; }
  .empty-state p { font-size:15px; }

  .result-card { background:var(--card);border-radius:12px;border:1px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,0.06);overflow:hidden;animation:fadeIn 0.2s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .card-header { background:var(--navy);padding:20px 24px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px; }
  .asset-id-badge { background:var(--mid);color:white;font-size:22px;font-weight:800;padding:6px 16px;border-radius:8px;letter-spacing:1px; }
  .asset-desc { color:var(--light);font-size:14px;margin-top:6px; }
  .no-filter-badge { background:var(--red);color:white;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;align-self:flex-start;margin-top:6px; }

  .meta-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-bottom:1px solid var(--border); }
  .meta-item { padding:14px 20px;border-right:1px solid var(--border); }
  .meta-item:last-child { border-right:none; }
  .meta-label { font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:4px; }
  .meta-value { font-size:13px;font-weight:600;color:var(--text);word-break:break-word; }
  .meta-value.serial { font-family:monospace;font-size:12px;color:var(--mid); }

  .schedules { display:grid;grid-template-columns:1fr 1fr;gap:0; }
  .schedule-panel { padding:20px 24px; }
  .schedule-panel:first-child { border-right:1px solid var(--border); }
  .panel-title { font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:14px;display:flex;align-items:center;gap:8px; }
  .panel-title .dot { width:10px;height:10px;border-radius:50%; }
  .svc-dot { background:var(--svc-dk); }
  .flt-dot { background:var(--flt-dk); }

  .date-list { display:flex;flex-direction:column;gap:6px; }
  .date-row { display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:7px;font-size:13px; }
  .date-row.svc { background:var(--svc); }
  .date-row.flt { background:var(--flt); }
  .date-row.current-month { background:#C6EFCE !important;border:2px solid #375623; }
  .date-row.past { opacity:0.4; }
  .date-val { font-weight:700;color:var(--navy); }
  .date-row.current-month .date-val { color:var(--green-dk); }
  .current-badge { font-size:10px;font-weight:800;background:#375623;color:white;padding:2px 7px;border-radius:10px;margin-left:6px; }
  .freq-tag { font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;color:white; }
  .freq-tag.svc { background:var(--svc-dk); }
  .freq-tag.flt { background:var(--flt-dk); }
  .freq-tag.current { background:var(--green-dk); }

  .weekly-note { margin-top:10px;padding:10px 12px;background:#FFF9E6;border-left:3px solid #F59E0B;border-radius:0 6px 6px 0;font-size:12px;color:#92400E;font-weight:600; }
  .no-data { color:var(--muted);font-size:13px;font-style:italic;padding:8px 0; }
  .decom-banner {
    background: #C00000; color: white; font-size: 13px; font-weight: 700;
    padding: 10px 24px; display: flex; align-items: center; gap: 10px;
    letter-spacing: 0.5px;
  }
  .decom-banner .decom-icon { font-size: 18px; }
  .decom-replaced { font-size: 12px; font-weight: 400; opacity: 0.85; margin-left: auto; }
  .schedules.blurred { filter: blur(2px); opacity: 0.4; pointer-events: none; user-select: none; }
  .decom-overlay {
    text-align: center; padding: 18px; background: #FFF0F0;
    border-top: 1px solid #FCA5A5; font-size: 13px; color: #C00000; font-weight: 600;
  }
    /* QR Scanner */
  .qr-btn { background:rgba(255,255,255,0.15);border:none;color:white;width:42px;height:42px;border-radius:10px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s; }
  .qr-btn:hover { background:rgba(255,255,255,0.25); }
  .qr-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;flex-direction:column;align-items:center;justify-content:center; }
  .qr-overlay.open { display:flex; }
  .qr-title { color:white;font-size:16px;font-weight:700;margin-bottom:16px;letter-spacing:.3px; }
  .qr-viewport { position:relative;width:280px;height:280px;border-radius:16px;overflow:hidden;background:#000; }
  .qr-video { width:100%;height:100%;object-fit:cover; }
  .qr-frame { position:absolute;inset:0;border:3px solid #2E75B6;border-radius:16px;pointer-events:none; }
  .qr-corner { position:absolute;width:28px;height:28px;border-color:#BDD7EE;border-style:solid; }
  .qr-corner.tl { top:8px;left:8px;border-width:3px 0 0 3px;border-radius:4px 0 0 0; }
  .qr-corner.tr { top:8px;right:8px;border-width:3px 3px 0 0;border-radius:0 4px 0 0; }
  .qr-corner.bl { bottom:8px;left:8px;border-width:0 0 3px 3px;border-radius:0 0 0 4px; }
  .qr-corner.br { bottom:8px;right:8px;border-width:0 3px 3px 0;border-radius:0 0 4px 0; }
  .qr-scan-line { position:absolute;left:12px;right:12px;height:2px;background:linear-gradient(90deg,transparent,#2E75B6,transparent);animation:scan 2s linear infinite; }
  @keyframes scan { 0%{top:12px} 100%{top:calc(100% - 14px)} }
  .qr-status { color:rgba(255,255,255,.7);font-size:13px;margin-top:14px;text-align:center;min-height:20px; }

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const today = new Date();
today.setHours(0,0,0,0);

function parseDate(str) {
  const [d,m,y] = str.split('/');
  return new Date(+y, +m-1, +d);
}
function fmtMonth(dateStr) {
  const [d,m,y] = dateStr.split('/');
  return MONTHS[+m-1] + ' ' + y;
}
function isCurrentMonth(dateStr) {
  const d = parseDate(dateStr);
  return d.getFullYear() === today.getFullYear() && d.getMonth() === today.getMonth();
}
function isPastMonth(dateStr) {
  const d = parseDate(dateStr);
  return d.getFullYear() < today.getFullYear() ||
         (d.getFullYear() === today.getFullYear() && d.getMonth() < today.getMonth());
}

const input = document.getElementById('searchInput');
const suggestions = document.getElementById('suggestions');
const resultContainer = document.getElementById('resultContainer');
const emptyState = document.getElementById('emptyState');
const allIds = Object.keys(ASSETS).sort();

input.addEventListener('input', () => {
  const q = input.value.trim().toUpperCase();
  if (q.length < 2) { suggestions.style.display = 'none'; return; }

  const matches = [];
  for (const id of allIds) {
    if (matches.length >= 12) break;
    const a = ASSETS[id];
    let matchType = null;
    if (id.includes(q))                          matchType = 'CBA';
    else if (a.site.toUpperCase().includes(q))   matchType = 'Site';
    else if (a.make.toUpperCase().includes(q))   matchType = 'Make';
    else if (a.model.toUpperCase().includes(q))  matchType = 'Model';
    else if (a.serial && a.serial.toUpperCase().includes(q)) matchType = 'Serial';
    else if (a.barcode && a.barcode.includes(q)) matchType = 'Barcode';
    else if (a.barcode && q.includes(a.barcode)) matchType = 'Barcode'; // handle leading zero strip
    if (matchType) matches.push({id, a, matchType});
  }

  if (!matches.length) { suggestions.style.display = 'none'; return; }

  suggestions.innerHTML = matches.map(({id, a, matchType}) => {
    const highlighted = matchType === 'CBA'
      ? id.replace(q, `<mark style="background:#BDD7EE;border-radius:3px;padding:0 1px">${q}</mark>`)
      : id;
    const serialCell = a.serial
      ? `<div class="sug-field"><div class="sug-label">Serial</div><div class="sug-value mono">${a.serial}</div></div>`
      : '';
    const statusBadge = a.status === 'Decommissioned'
      ? `<span style="font-size:10px;font-weight:700;background:#C00000;color:white;padding:2px 7px;border-radius:10px;flex-shrink:0">DECOMMISSIONED</span>`
      : a.status === 'Upgraded'
      ? `<span style="font-size:10px;font-weight:700;background:#833C00;color:white;padding:2px 7px;border-radius:10px;flex-shrink:0">UPGRADED</span>`
      : '';
    return `<div class="suggestion-item" onclick="selectAsset('${id}')" style="${a.status==='Decommissioned'?'opacity:0.7':a.status==='Upgraded'?'opacity:0.7':''}">
      <div class="sug-header">
        <span class="sug-cba">${highlighted}</span>
        <span class="sug-match-badge">${matchType}</span>
        ${statusBadge}
        <span class="sug-site">${a.site}</span>
      </div>
      <div class="sug-grid">
        <div class="sug-field"><div class="sug-label">Make</div><div class="sug-value">${a.make || '—'}</div></div>
        <div class="sug-field"><div class="sug-label">Model</div><div class="sug-value">${a.model || '—'}</div></div>
        ${serialCell}
        <div class="sug-field"><div class="sug-label">Location</div><div class="sug-value">${a.loc || '—'}</div></div>
        <div class="sug-field"><div class="sug-label">Type</div><div class="sug-value">${a.type || '—'}</div></div>
      </div>
    </div>`;
  }).join('');
  suggestions.style.display = 'block';
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-box')) suggestions.style.display = 'none';
});
window.addEventListener('scroll', () => { suggestions.style.display='none'; }, {passive:true});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const q = input.value.trim().toUpperCase();
    suggestions.style.display = 'none';
    showResult(q);
  }
});

function selectAsset(id) {
  input.value = id;
  input.blur();
  suggestions.style.display = 'none';
  showResult(id);
}

function showResult(id) {
  emptyState.style.display = 'none';
  // Try direct lookup first
  let a = ASSETS[id];
  // If not found, try barcode map (handles typed barcode numbers)
  if (!a) {
    const barcodeMap = buildBarcodeMap();
    const mappedId = barcodeMap[id] || barcodeMap[id.replace(/^0+/,'')];
    if (mappedId) { showResult(mappedId); return; }
    resultContainer.innerHTML = `<div class="not-found">Asset "${id}" not found — try searching by serial number, building or make instead.</div>`;
    return;
  }

  const svcRows = a.svc.map(s => {
    const curr = isCurrentMonth(s.date);
    const past = !curr && isPastMonth(s.date);
    const cls = curr ? 'svc current-month' : past ? 'svc past' : 'svc';
    const badge = curr ? `<span class="current-badge">THIS MONTH</span>` : '';
    return `<div class="date-row ${cls}">
      <span class="date-val">${fmtMonth(s.date)}${badge}</span>
      <span class="freq-tag ${curr?'current':'svc'}">${s.freq}</span>
    </div>`;
  }).join('') || '<p class="no-data">No service schedule found</p>';

  const fltRows = a.flt.map(f => {
    const curr = isCurrentMonth(f.date);
    const past = !curr && isPastMonth(f.date);
    const cls = curr ? 'flt current-month' : past ? 'flt past' : 'flt';
    const badge = curr ? `<span class="current-badge">THIS MONTH</span>` : '';
    return `<div class="date-row ${cls}">
      <span class="date-val">${fmtMonth(f.date)}${badge}</span>
      <span class="freq-tag ${curr?'current':'flt'}">${f.freq}</span>
    </div>`;
  }).join('') || '<p class="no-data">No filter schedule found</p>';

  const wTypes = a.weeklyFltTypes || (a.weeklyFlt ? ['Weekly'] : []);
  const weeklyNote = wTypes.length
    ? `<div class="weekly-note">This asset also has a ${wTypes.join(' / ')} filter clean — see the dedicated report</div>`
    : '';
  const noFilterBadge = (!a.flt.length && !wTypes.length)
    ? `<span class="no-filter-badge">NO FILTER ASSIGNED</span>` : '';

  const serialRow = a.serial
    ? `<div class="meta-item"><div class="meta-label">Serial No</div><div class="meta-value serial">${a.serial}</div></div>`
    : '';
  const barcodeRow = `<div class="meta-item"><div class="meta-label">QR / Barcode</div><div class="meta-value serial" style="color:#6B7280">${a.barcode || '&mdash;'}</div></div>`;

  // Build unique frequency labels
  const svcFreqs = [...new Set((a.svc||[]).map(s=>s.freq))].join(', ') || '—';
  const fltFreqs = [...new Set((a.flt||[]).map(f=>f.freq))].join(', ');
  const wkTypes = (a.weeklyFltTypes && a.weeklyFltTypes.length) ? a.weeklyFltTypes.join(' / ') : (a.weeklyFlt ? 'Weekly' : '');
  const fltFreqDisplay = wkTypes
    ? (fltFreqs ? fltFreqs + ' + ' + wkTypes : wkTypes)
    : (fltFreqs || '—');
  const svcFreqRow = `<div class="meta-item"><div class="meta-label">Service Frequency</div><div class="meta-value" style="color:var(--svc-dk);font-weight:700">${svcFreqs}</div></div>`;
  const fltFreqRow = `<div class="meta-item"><div class="meta-label">Filter Frequency</div><div class="meta-value" style="color:var(--flt-dk);font-weight:700">${fltFreqDisplay}</div></div>`;

  const isDecom = a.status === 'Decommissioned';
  const isUpgraded = a.status === 'Upgraded';
  const decomBanner = isDecom
    ? `<div class="decom-banner">
        <span class="decom-icon">&#9888;</span>
        DECOMMISSIONED — This asset is no longer in service
        ${a.replacedBy ? '<span class="decom-replaced">Replaced by: '+a.replacedBy+'</span>' : ''}
       </div>`
    : isUpgraded
    ? `<div class="decom-banner" style="background:#833C00">
        <span class="decom-icon">&#8593;</span>
        UPGRADED — This asset has been replaced
        ${a.replacedBy ? '<span class="decom-replaced">New asset: '+a.replacedBy+'</span>' : ''}
       </div>`
    : '';

  resultContainer.innerHTML = `
    <div class="result-card">
      <div class="card-header">
        <div>
          <div class="asset-id-badge">${id}</div>
          <div class="asset-desc">${a.desc}</div>
          ${noFilterBadge}
        </div>
      </div>
      ${decomBanner}
      <div class="meta-grid">
        <div class="meta-item"><div class="meta-label">Site</div><div class="meta-value">${a.site}</div></div>
        <div class="meta-item"><div class="meta-label">Location</div><div class="meta-value">${a.loc}</div></div>
        <div class="meta-item"><div class="meta-label">Make</div><div class="meta-value">${a.make}</div></div>
        <div class="meta-item"><div class="meta-label">Model</div><div class="meta-value">${a.model}</div></div>
        ${serialRow}
        ${barcodeRow}
        ${svcFreqRow}
        ${fltFreqRow}
      </div>
      <div class="schedules${isDecom||isUpgraded ? ' blurred' : ''}">
        <div class="schedule-panel">
          <div class="panel-title"><span class="dot svc-dot"></span> Service Schedule</div>
          <div class="date-list">${svcRows}</div>
        </div>
        <div class="schedule-panel">
          <div class="panel-title"><span class="dot flt-dot"></span> Filter Cleans</div>
          <div class="date-list">${fltRows}</div>
          ${weeklyNote}
        </div>
      </div>
    </div>
    ${isDecom||isUpgraded ? '<div class="decom-overlay">Schedule data shown for reference only — this asset is no longer active</div>' : ''}
    </div>`;
}

// ── QR Scanner ────────────────────────────────────────────────────
let zxingReader = null;

function buildBarcodeMap() {
  const map = {};
  for (const [id, a] of Object.entries(ASSETS)) {
    if (a.barcode) map[a.barcode.trim()] = id;
  }
  return map;
}

function openQRScanner() {
  document.getElementById('qrOverlay').classList.add('open');
  document.getElementById('qrStatus').textContent = 'Starting camera...';
  const video = document.getElementById('qrVideo');

  try {
    const hints = new Map();
    const formats = [
      ZXing.BarcodeFormat.QR_CODE,
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.UPC_A,
      ZXing.BarcodeFormat.DATA_MATRIX,
      ZXing.BarcodeFormat.PDF_417,
    ];
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

    zxingReader = new ZXing.BrowserMultiFormatReader(hints);
    zxingReader.decodeFromVideoDevice(null, video, (result, err) => {
      if (result) {
        handleQRResult(result.getText().trim());
      }
      if (err && !(err instanceof ZXing.NotFoundException)) {
        console.warn('Scan error:', err);
      }
    });
    document.getElementById('qrStatus').textContent = 'Scanning — hold steady over the code';
  } catch(e) {
    document.getElementById('qrStatus').textContent = 'Scanner error: ' + e.message;
  }
}

function handleQRResult(raw) {
  closeQRScanner();
  const barcodeMap = buildBarcodeMap();
  if (barcodeMap[raw]) {
    const id = barcodeMap[raw];
    document.getElementById('searchInput').value = id;
    document.getElementById('emptyState').style.display = 'none';
    showResult(id);
    return;
  }
  const cbaMatch = raw.match(/CBA\d+[A-Za-z]?/i);
  if (cbaMatch) {
    const id = cbaMatch[0].toUpperCase();
    document.getElementById('searchInput').value = id;
    document.getElementById('emptyState').style.display = 'none';
    showResult(id);
    return;
  }
  document.getElementById('searchInput').value = raw;
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('resultContainer').innerHTML =
    '<div class="not-found">Scanned: <strong>' + raw + '</strong><br><br>No matching asset found. Add this barcode in the Admin app to link it.</div>';
}

function closeQRScanner() {
  if (zxingReader) { zxingReader.reset(); zxingReader = null; }
  document.getElementById('qrOverlay').classList.remove('open');
}

document.getElementById('qrOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeQRScanner();
});
</script>
